name: Socitopia CI
on:
 push:
  branches:
   - master
   - dev
 pull_request:
  branches:
   - master
   - dev
jobs:
  build:
   runs-on: ubuntu_latest
   
   steps:
    - name: Checkout Code
      uses: actions/Checkout@v4

    - name: setup Node.js  
      uses: actions/setup-node@v4
      with:
       node-version:20
       cache:npm
    - name: install dependencies
      run:  npm ci
    - name: Run ESLint
      run:  npm run lint
    - name: Build Application
      run:  npm run build