apiVersion: apps/v1
kind: Deployment
metadata:
  name: socket
  namespace: smartsociety
  labels:
    app: socket-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: socket-server
  template:
    metadata:
      labels:
        app: socket-server
    spec:
      containers:
      - name: socket
        image: samradhi/smartsociety-socket:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
             name: socket-config
        - secretRef:
             name: socket-secret
